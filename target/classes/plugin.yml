name: MTGuards
main: com.metatask.mtguards.MTGuardsPlugin
version: 1.0.4-SNAPSHOT
api-version: '1.20'
author: Chris
depend: [Citizens]
softdepend: [WorldEdit]
commands:
  mtguards:
    description: Manage MTGuards NPC guards
    usage: /<command> <create|remove|list|reload>
    permission: mtguards.use
permissions:
  mtguards.use:
    default: true
  mtguards.admin:
    default: op
    children:
      mtguards.admin.create: true
      mtguards.admin.remove: true
      mtguards.admin.list: true
      mtguards.admin.reload: true
      mtguards.admin.setradius: true
      mtguards.admin.strict: true
      mtguards.admin.attack: true
      mtguards.admin.skin: true
      mtguards.admin.equipweapon: true
      mtguards.admin.equiparmor: true
      mtguards.admin.stationary: true
      mtguards.admin.pattern: true
      mtguards.admin.info: true
      mtguards.admin.setlabel: true
      mtguards.admin.setname: true
  mtguards.safe:
    default: false
  mtguards.hostile:
    default: false
